<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="exp_tracker.css" />
  </head>
  <body>
    <div class="container">
      <h1><i class="ti ti-wallet"></i> Expense Tracker</h1>

      <!-- Summary -->
      <div class="summary">
        <div class="stat">
          <div class="stat-label">Income</div>
          <div class="stat-value income" id="total-income">₹0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Expenses</div>
          <div class="stat-value expense" id="total-expense">₹0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Balance</div>
          <div class="stat-value balance" id="total-balance">₹0</div>
        </div>
      </div>

      <!-- Add / Edit Form -->
      <div class="card">
        <div class="card-title">
          <span id="form-title">Add transaction</span>
        </div>

        <div class="form-row">
          <div>
            <label for="desc">Description</label>
            <input type="text" id="desc" placeholder="e.g. Grocery shopping" />
          </div>
          <div>
            <label for="amount">Amount (₹)</label>
            <input
              type="number"
              id="amount"
              placeholder="0"
              min="0"
              step="0.01"
            />
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="category">Category</label>
            <select id="category">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Shopping">Shopping</option>
              <option value="Bills">Bills</option>
              <option value="Health">Health</option>
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label for="date">Date</label>
            <input type="date" id="date" />
          </div>
        </div>

        <div style="margin-bottom: 10px">
          <label>Type</label>
          <div class="type-toggle">
            <button
              class="type-btn active expense"
              id="btn-expense"
              onclick="setType('expense')"
            >
              <i class="ti ti-minus"></i> Expense
            </button>
            <button
              class="type-btn income"
              id="btn-income"
              onclick="setType('income')"
            >
              <i class="ti ti-plus"></i> Income
            </button>
          </div>
        </div>

        <button class="add-btn" id="submit-btn" onclick="submitEntry()">
          <i class="ti ti-plus"></i> Add entry
        </button>
      </div>

      <!-- Category breakdown -->
      <div class="card">
        <div class="card-title">Spending by category</div>
        <div id="cat-chart">
          <p style="font-size: 13px; color: #888780">No expenses yet.</p>
        </div>
      </div>

      <!-- Transaction list -->
      <div class="card">
        <div class="card-title">
          <span>Transactions</span>
          <span id="tx-count" style="font-weight: 400; font-size: 12px"></span>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all', this)">
            All
          </button>
          <button class="filter-btn" onclick="setFilter('income', this)">
            Income
          </button>
          <button class="filter-btn" onclick="setFilter('expense', this)">
            Expenses
          </button>
        </div>
        <div class="tx-list" id="tx-list"></div>
      </div>
    </div>

    <div class="back-to-portfolio">
      <a href="../index.html" class="btn-portfolio">Go back to Portfolio</a>
    </div>

    <script src="expense_core.js"></script>
    <script src="expense_crud.js"></script>
    <script src="expense_display.js"></script>
    <script src="expense_renderer.js"></script>
  </body>
</html>
